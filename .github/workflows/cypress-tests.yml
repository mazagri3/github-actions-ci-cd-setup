name: Cypress Tests

on:
  pull_request:
    branches:
      - develop

jobs:
  cypress-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Change to project directory
        run: cd 20-Deployment-CI-CD/02-Challenge

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:ci
        env:
          CI: true 